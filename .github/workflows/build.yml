name: Build Winlator iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Download UTM Libraries
        run: |
          curl -L https://github.com/utmapp/UTM/releases/latest/download/UTM.ipa -o UTM.ipa
          unzip UTM.ipa -d UTM_extracted

      - name: Build IPA
        run: echo "Build steps here"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WinlatorIOS
          path: "*.ipa"
